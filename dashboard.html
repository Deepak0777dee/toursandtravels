<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — STACKLY</title>
  <link rel="stylesheet" href="css/style.css?v=1" />
  <style>
    body { background: var(--bg-light); display: flex; min-height: 100vh; padding-top: 0; font-family: var(--font-body); }
    /* Sidebar */
    .dashboard-sidebar { width: 280px; background: #fff; border-right: 1px solid var(--border-light); display: flex; flex-direction: column; position: fixed; top: 0; bottom: 0; left: 0; z-index: 100; transition: transform 0.3s; }
    .sidebar-header { padding: 1.5rem; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; }
    .sidebar-logo img { height: 32px; }
    .sidebar-nav { padding: 1.5rem 1rem; flex: 1; overflow-y: auto; }
    .nav-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dark-secondary); margin: 1.5rem 0 0.75rem 1rem; font-weight: 700; }
    .nav-label:first-child { margin-top: 0; }
    .sidebar-link { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; color: var(--text-dark); text-decoration: none; border-radius: var(--radius-lg); font-weight: 600; font-size: 0.95rem; margin-bottom: 0.25rem; transition: all 0.2s; }
    .sidebar-link svg { color: var(--text-dark-secondary); transition: all 0.2s; }
    .sidebar-link:hover { background: var(--bg-light-alt); }
    .sidebar-link.active { background: rgba(15,118,110,0.08); color: var(--primary); }
    .sidebar-link.active svg { color: var(--primary); }
    .sidebar-footer { padding: 1rem; border-top: 1px solid var(--border-light); }
    
    /* Main Content */
    .dashboard-main { flex: 1; margin-left: 280px; display: flex; flex-direction: column; min-height: 100vh; }
    .dashboard-header { height: 72px; background: #fff; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; position: sticky; top: 0; z-index: 90; }
    .header-search { display: flex; align-items: center; background: var(--bg-light-alt); border-radius: var(--radius-full); padding: 0.5rem 1rem; width: 300px; }
    .header-search input { border: none; background: transparent; outline: none; padding-left: 0.5rem; width: 100%; font-size: 0.9rem; }
    .header-actions { display: flex; align-items: center; gap: 1.5rem; }
    .action-btn { position: relative; background: none; border: none; cursor: pointer; color: var(--text-dark-secondary); }
    .action-badge { position: absolute; top: -5px; right: -5px; background: var(--danger); color: #fff; font-size: 0.65rem; font-weight: 700; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .user-profile { display: flex; align-items: center; gap: 0.75rem; cursor: pointer; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.1rem; }
    .user-info { display: flex; flex-direction: column; }
    .user-name { font-weight: 700; font-size: 0.9rem; color: var(--text-dark); }
    .user-role { font-size: 0.75rem; color: var(--text-dark-secondary); }
    
    .dashboard-content { padding: 2rem; flex: 1; }
    .page-title { font-family: var(--font-heading); font-size: 1.75rem; font-weight: 800; margin-bottom: 1.5rem; }
    
    /* Stats Grid */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
    .stat-card { background: #fff; border: 1px solid var(--border-light); border-radius: var(--radius-xl); padding: 1.5rem; display: flex; flex-direction: column; }
    .stat-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
    .stat-icon { width: 40px; height: 40px; border-radius: var(--radius-lg); background: rgba(15,118,110,0.1); color: var(--primary); display: flex; align-items: center; justify-content: center; }
    .stat-val { font-family: var(--font-heading); font-size: 1.8rem; font-weight: 800; color: var(--text-dark); }
    .stat-label { font-size: 0.85rem; color: var(--text-dark-secondary); font-weight: 600; }
    .stat-trend { display: flex; align-items: center; gap: 0.25rem; font-size: 0.85rem; font-weight: 600; margin-top: 0.5rem; }
    .trend-up { color: var(--success); }
    
    /* Recent Bookings */
    .panel { background: #fff; border: 1px solid var(--border-light); border-radius: var(--radius-xl); overflow: hidden; margin-bottom: 2rem; }
    .panel-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center; }
    .panel-title { font-family: var(--font-heading); font-weight: 700; font-size: 1.1rem; }
    .table-wrapper { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 1rem 1.5rem; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-dark-secondary); background: var(--bg-light-alt); border-bottom: 1px solid var(--border-light); }
    td { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border-light); font-size: 0.9rem; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    .status-badge { display: inline-flex; align-items: center; padding: 0.25rem 0.75rem; border-radius: var(--radius-full); font-size: 0.75rem; font-weight: 700; }
    .status-confirmed { background: rgba(16,185,129,0.1); color: var(--success); }
    .status-pending { background: rgba(245,158,11,0.1); color: var(--warning); }
    
    .mobile-menu-btn { display: none; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-dark); }
    @media (max-width: 992px) {
      .dashboard-sidebar { transform: translateX(-100%); }
      .dashboard-sidebar.open { transform: translateX(0); }
      .dashboard-main { margin-left: 0; }
      .mobile-menu-btn { display: block; }
      .header-search { display: none; }
    }
  </style>
</head>
<body>

<aside class="dashboard-sidebar" id="sidebar">
  <div class="sidebar-header">
    <a href="index.html" class="sidebar-logo"><img src="images/logo-stackly.webp" alt="STACKLY" style="filter:invert(1);" /></a>
    <button class="mobile-menu-btn" id="closeSidebar" style="display:block;@media(min-width:992px){display:none;}"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-label">Main</div>
    <a href="dashboard.html" class="sidebar-link active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg> Dashboard</a>
    <a href="bookings.html" class="sidebar-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg> My Bookings</a>
    <a href="messages.html" class="sidebar-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> Messages</a>
    
    <div class="nav-label">Settings</div>
    <a href="settings.html" class="sidebar-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg> Account</a>
    <a href="#" class="sidebar-link" onclick="authLogout();return false;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Logout</a>
  </nav>
  <div class="sidebar-footer">
    <a href="index.html" style="font-size:0.8rem;color:var(--text-dark-secondary);text-decoration:none;font-weight:600;display:flex;align-items:center;gap:0.4rem;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg> Back to Website</a>
  </div>
</aside>

<main class="dashboard-main">
  <header class="dashboard-header">
    <div style="display:flex;align-items:center;gap:1rem;">
      <button class="mobile-menu-btn" id="openSidebar"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <div class="header-search"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-dark-secondary);"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" placeholder="Search destinations, bookings..." /></div>
    </div>
    <div class="header-actions">
      <button class="action-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="action-badge">2</span></button>
      <div class="user-profile">
        <div class="avatar" id="userAvatar">U</div>
        <div class="user-info"><span class="user-name" id="userNameDisplay">User</span><span class="user-role" id="userRoleDisplay">Traveler</span></div>
      </div>
    </div>
  </header>
  
  <div class="dashboard-content">
    <h1 class="page-title">Overview</h1>
    
    <div class="stats-grid" id="statsGrid">
      <!-- Injected by JS based on role -->
    </div>
    
    <div class="panel">
      <div class="panel-header">
        <h2 class="panel-title">Recent Bookings</h2>
        <a href="bookings.html" style="font-size:0.85rem;color:var(--primary);font-weight:600;text-decoration:none;">View All</a>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Destination</th>
              <th>Date</th>
              <th>Amount</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td style="font-weight:600;">#BKG-8492</td>
              <td><div style="display:flex;align-items:center;gap:0.75rem;"><img src="images/dest-maldives.webp" style="width:40px;height:40px;border-radius:8px;object-fit:cover;"><span>Maldives Luxury</span></div></td>
              <td>Nov 15, 2026</td>
              <td style="font-weight:600;">$4,999</td>
              <td><span class="status-badge status-confirmed">Confirmed</span></td>
            </tr>
            <tr>
              <td style="font-weight:600;">#BKG-8491</td>
              <td><div style="display:flex;align-items:center;gap:0.75rem;"><img src="images/dest-swiss.webp" style="width:40px;height:40px;border-radius:8px;object-fit:cover;"><span>Swiss Alps</span></div></td>
              <td>Dec 02, 2026</td>
              <td style="font-weight:600;">$3,199</td>
              <td><span class="status-badge status-pending">Pending</span></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<script src="js/auth.js"></script>
<script>
  if (!authIsLoggedIn()) window.location.href = 'login.html';
  
  const user = authGetUser();
  if(user) {
    document.getElementById('userNameDisplay').textContent = user.name;
    document.getElementById('userRoleDisplay').textContent = user.role;
    document.getElementById('userAvatar').textContent = user.name.charAt(0).toUpperCase();
    
    const statsGrid = document.getElementById('statsGrid');
    if(user.role === 'Travel Agent') {
      statsGrid.innerHTML = `
        <div class="stat-card"><div class="stat-header"><div class="stat-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div></div><div class="stat-val">124</div><div class="stat-label">Active Clients</div><div class="stat-trend trend-up"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg> +12% this month</div></div>
        <div class="stat-card"><div class="stat-header"><div class="stat-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg></div></div><div class="stat-val">45</div><div class="stat-label">Total Bookings (MTD)</div><div class="stat-trend trend-up"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg> +5% this month</div></div>
        <div class="stat-card"><div class="stat-header"><div class="stat-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div></div><div class="stat-val">$42.5k</div><div class="stat-label">Commission Earned</div><div class="stat-trend trend-up"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg> +8% this month</div></div>
      `;
    } else {
      statsGrid.innerHTML = `
        <div class="stat-card"><div class="stat-header"><div class="stat-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg></div></div><div class="stat-val">4</div><div class="stat-label">Upcoming Trips</div></div>
        <div class="stat-card"><div class="stat-header"><div class="stat-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"/><circle cx="12" cy="10" r="3"/></svg></div></div><div class="stat-val">12</div><div class="stat-label">Past Destinations</div></div>
        <div class="stat-card"><div class="stat-header"><div class="stat-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div></div><div class="stat-val">2,450</div><div class="stat-label">Reward Points</div></div>
      `;
    }
  }

  // Sidebar toggle
  const sidebar = document.getElementById('sidebar');
  document.getElementById('openSidebar')?.addEventListener('click', () => sidebar.classList.add('open'));
  document.getElementById('closeSidebar')?.addEventListener('click', () => sidebar.classList.remove('open'));
</script>
</body>
</html>
