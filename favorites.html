<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Favorites — STACKLY</title>
  <link rel="stylesheet" href="css/style.css?v=1" />
  <style>
    body { background: var(--bg-light); display: flex; min-height: 100vh; padding-top: 0; font-family: var(--font-body); }
    .dashboard-sidebar { width: 280px; background: #fff; border-right: 1px solid var(--border-light); display: flex; flex-direction: column; position: fixed; top: 0; bottom: 0; left: 0; z-index: 100; transition: transform 0.3s; }
    .sidebar-header { padding: 1.5rem; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; }
    .sidebar-logo img { height: 32px; }
    .sidebar-nav { padding: 1.5rem 1rem; flex: 1; overflow-y: auto; }
    .nav-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dark-secondary); margin: 1.5rem 0 0.75rem 1rem; font-weight: 700; }
    .nav-label:first-child { margin-top: 0; }
    .sidebar-link { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; color: var(--text-dark); text-decoration: none; border-radius: var(--radius-lg); font-weight: 600; font-size: 0.95rem; margin-bottom: 0.25rem; transition: all 0.2s; }
    .sidebar-link svg { color: var(--text-dark-secondary); transition: all 0.2s; }
    .sidebar-link:hover { background: var(--bg-light-alt); }
    .sidebar-link.active { background: rgba(15,118,110,0.08); color: var(--primary); }
    .sidebar-link.active svg { color: var(--primary); }
    .sidebar-footer { padding: 1rem; border-top: 1px solid var(--border-light); }
    .dashboard-main { flex: 1; margin-left: 280px; display: flex; flex-direction: column; min-height: 100vh; }
    .dashboard-header { height: 72px; background: #fff; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; position: sticky; top: 0; z-index: 90; }
    .header-actions { display: flex; align-items: center; gap: 1.5rem; margin-left: auto; }
    .user-profile { display: flex; align-items: center; gap: 0.75rem; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; }
    .dashboard-content { padding: 2rem; flex: 1; }
    .page-title { font-family: var(--font-heading); font-size: 1.75rem; font-weight: 800; margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center; }
    .panel { background: #fff; border: 1px solid var(--border-light); border-radius: var(--radius-xl); overflow: hidden; margin-bottom: 2rem; }
    .panel-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center; }
    .filter-tabs { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .filter-tab { padding: 0.4rem 1rem; font-size: 0.85rem; font-weight: 600; border-radius: var(--radius-full); border: 1px solid transparent; background: transparent; color: var(--text-dark-secondary); cursor: pointer; transition: all 0.2s; }
    .filter-tab.active { background: rgba(15,118,110,0.1); color: var(--primary); }
    .table-wrapper { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 1rem 1.5rem; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-dark-secondary); background: var(--bg-light-alt); border-bottom: 1px solid var(--border-light); }
    td { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border-light); font-size: 0.9rem; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    .status-badge { display: inline-flex; align-items: center; padding: 0.25rem 0.75rem; border-radius: var(--radius-full); font-size: 0.75rem; font-weight: 700; }
    .status-confirmed { background: rgba(16,185,129,0.1); color: var(--success); }
    .status-pending { background: rgba(245,158,11,0.1); color: var(--warning); }
    .status-completed { background: rgba(59,130,246,0.1); color: #3B82F6; }
    .action-link { color: var(--primary); font-weight: 600; text-decoration: none; font-size: 0.85rem; }
    @media (max-width: 992px) {
      .dashboard-sidebar { transform: translateX(-100%); }
      .dashboard-sidebar.open { transform: translateX(0); }
      .dashboard-main { margin-left: 0; }
    }
    @media (max-width: 768px) {
      .dashboard-header { padding: 0 0.75rem; gap: 0.5rem; }
      .dashboard-content { padding: 0.75rem; }
      .stats-grid { gap: 0.75rem; margin-bottom: 1rem; }
      .panel { margin-bottom: 1rem; }
      .panel-header { padding: 1rem; }
      .table-wrapper td, .table-wrapper th { padding: 0.75rem 1rem; }
      .user-info { max-width: 110px; overflow: hidden; }
      #userEmailDisplay, .user-name, .user-role { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .page-title { font-size: 1.5rem; flex-direction: column; align-items: flex-start; gap: 0.5rem; margin-bottom: 1rem; }
      .stat-card { padding: 1rem; }
    }
  </style>
</head>
<body>

<aside class="dashboard-sidebar" id="sidebar">
  <div class="sidebar-header"><a href="index.html" class="sidebar-logo"><img src="images/logo-stackly.webp" alt="STACKLY" style="filter:invert(1);" /></a><button class="mobile-menu-btn" id="closeSidebar" style="display:block;@media(min-width:992px){display:none;}"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
  <nav class="sidebar-nav">
    <div class="nav-label">Main</div>
    <a href="dashboard.html" class="sidebar-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg> Dashboard</a>
    <a href="bookings.html" class="sidebar-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg> Bookings</a>
    <a href="favorites.html" class="sidebar-link active" data-role="traveler-only"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> Favorites</a>
    <a href="clients.html" class="sidebar-link" data-role="agent-only"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> Clients</a>
    <a href="analytics.html" class="sidebar-link" data-role="agent-only"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg> Analytics</a>
    <div class="nav-label">Settings</div>
    <a href="settings.html" class="sidebar-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg> Account</a>
    <a href="#" class="sidebar-link" onclick="authLogout();return false;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Logout</a>
  </nav>
  <div class="sidebar-footer"><a href="index.html" style="font-size:0.8rem;color:var(--text-dark-secondary);text-decoration:none;font-weight:600;display:flex;align-items:center;gap:0.4rem;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg> Back to Website</a></div>
</aside>

<main class="dashboard-main">
  <header class="dashboard-header">
    <div style="display:flex;align-items:center;gap:1rem;"><button class="mobile-menu-btn" id="openSidebar" style="display:block;@media(min-width:992px){display:none;}"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button></div>
    <div class="header-actions">
      <div class="user-profile">
        <div class="avatar" id="userAvatar">U</div>
        <div class="user-info" style="display:flex;flex-direction:column;">
          <span class="user-name" id="userNameDisplay" style="font-weight:700;font-size:0.9rem;color:var(--text-dark);line-height:1.2;">User</span>
          <span class="user-role" id="userRoleDisplay" style="font-size:0.75rem;color:var(--primary);font-weight:700;">Traveler</span>
          <span id="userEmailDisplay" style="font-size:0.7rem;color:var(--text-dark-secondary);"></span>
        </div>
      </div>
    </div>
  </header>
  
  <div class="dashboard-content">
    <div class="page-title">Saved Favorites</div>
    <div class="stats-grid">
      <div class="stat-card" style="padding:1rem;">
        <img src="images/dest-maldives.webp" style="width:100%;height:150px;object-fit:cover;border-radius:var(--radius-lg);margin-bottom:1rem;">
        <h3 style="font-weight:700;font-size:1.1rem;margin-bottom:0.25rem;">Maldives Luxury</h3>
        <p style="font-size:0.85rem;color:var(--text-dark-secondary);">Island Resort</p>
        <a href="404.html" class="btn btn-primary" style="width:100%;margin-top:1rem;display:inline-block;box-sizing:border-box;text-align:center;">Book Now</a>
      </div>
      <div class="stat-card" style="padding:1rem;">
        <img src="images/dest-bali.webp" style="width:100%;height:150px;object-fit:cover;border-radius:var(--radius-lg);margin-bottom:1rem;">
        <h3 style="font-weight:700;font-size:1.1rem;margin-bottom:0.25rem;">Bali Retreat</h3>
        <p style="font-size:0.85rem;color:var(--text-dark-secondary);">Cultural Wellness</p>
        <button class="btn btn-primary" style="width:100%;margin-top:1rem;">Book Now</button>
      </div>
    </div>
  </div>
</main>

<script src="js/auth.js"></script>
<script>
  if (!authIsLoggedIn()) window.location.href = 'login.html';
  const user = authGetUser();
  if(user) {
    document.getElementById('userAvatar').textContent = user.name.charAt(0).toUpperCase();
    const nameDisp = document.getElementById('userNameDisplay');
    const roleDisp = document.getElementById('userRoleDisplay');
    const emailDisp = document.getElementById('userEmailDisplay');
    if(nameDisp) nameDisp.textContent = user.name;
    if(roleDisp) roleDisp.textContent = user.role;
    if(emailDisp) emailDisp.textContent = user.email;
  }
  document.getElementById('openSidebar')?.addEventListener('click', () => document.getElementById('sidebar').classList.add('open'));
  document.getElementById('closeSidebar')?.addEventListener('click', () => document.getElementById('sidebar').classList.remove('open'));
</script>
</body>
</html>
