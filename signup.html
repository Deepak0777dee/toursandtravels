<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — STACKLY Tours & Travels</title>
  <link rel="stylesheet" href="css/style.css?v=1" />
  <style>
    body { background: var(--bg-dark); display: flex; flex-direction: column; min-height: 100vh; padding-top: 0; }
    .auth-wrapper { flex: 1; display: grid; grid-template-columns: 1fr; min-height: 100vh; position: relative; overflow: hidden; }
    @media (min-width: 992px) { .auth-wrapper { grid-template-columns: 1fr 1fr; } .auth-left { order: 2; } .auth-right { order: 1; } }
    .auth-left { display: none; background: linear-gradient(145deg, var(--primary-dark), var(--secondary)); padding: 4rem; position: relative; overflow: hidden; align-items: center; justify-content: center; }
    @media (min-width: 992px) { .auth-left { display: flex; } }
    .auth-left::before { content: ''; position: absolute; inset: 0; background: url('images/hero-1.webp') center/cover; opacity: 0.3; pointer-events: none; mix-blend-mode: overlay; }
    .auth-left-content { position: relative; z-index: 1; max-width: 480px; }
    .auth-left-logo { display: inline-block; margin-bottom: 3rem; }
    .auth-left-logo img { height: 40px; filter: brightness(0) invert(1); }
    .auth-left-title { font-family: var(--font-heading); font-size: 2.8rem; font-weight: 800; color: #fff; line-height: 1.15; margin-bottom: 1.5rem; }
    .auth-left-desc { font-size: 1.15rem; color: var(--text-light-secondary); line-height: 1.7; }
    .auth-right { display: flex; align-items: center; justify-content: center; padding: 2rem; position: relative; background: var(--bg-light); }
    .auth-bg-shape { position: absolute; border-radius: 50%; filter: blur(80px); z-index: 0; opacity: 0.15; }
    .auth-bg-shape-1 { top: -10%; right: -10%; width: 500px; height: 500px; background: rgba(15,118,110,0.15); }
    .auth-bg-shape-2 { bottom: -10%; left: -10%; width: 600px; height: 600px; background: rgba(245,158,11,0.08); }
    .auth-card { width: 100%; max-width: 500px; position: relative; z-index: 1; text-align: left; }
    .mobile-logo { display: inline-block; margin-bottom: 2.5rem; }
    @media (min-width: 992px) { .mobile-logo { display: none; } }
    .mobile-logo img { height: 36px; filter: none; }
    .auth-title { font-family: var(--font-heading); font-size: 2rem; font-weight: 800; color: var(--text-dark); margin-bottom: 0.5rem; }
    .auth-subtitle { color: var(--text-dark-secondary); font-size: 1rem; margin-bottom: 2rem; }
    .auth-form .form-label { color: var(--text-dark); }
    .auth-form .form-control { background: #fff; border: 1px solid var(--border-light-strong); color: var(--text-dark); }
    .auth-form .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(var(--primary-rgb),0.15); }
    .auth-form .form-control::placeholder { color: var(--text-dark-secondary); }
    .auth-form .form-control:-webkit-autofill { -webkit-box-shadow: 0 0 0 30px #fff inset !important; -webkit-text-fill-color: var(--text-dark) !important; }
    .role-options { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
    .role-option { position: relative; }
    .role-option input { position: absolute; opacity: 0; cursor: pointer; }
    .role-label { display: flex; flex-direction: column; align-items: center; padding: 1rem; background: var(--bg-light-alt); border: 2px solid transparent; border-radius: var(--radius-lg); cursor: pointer; transition: all 0.3s; }
    .role-label svg { margin-bottom: 0.5rem; color: var(--text-dark-secondary); transition: all 0.3s; }
    .role-label span { font-weight: 600; font-size: 0.9rem; color: var(--text-dark-secondary); transition: all 0.3s; }
    .role-option input:checked + .role-label { border-color: var(--primary); background: rgba(15,118,110,0.06); }
    .role-option input:checked + .role-label svg, .role-option input:checked + .role-label span { color: var(--primary); }
    .name-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-md); margin-bottom: var(--space-md); }
    @media (max-width: 480px) { .auth-title { font-size: 1.7rem; } .role-options { grid-template-columns: 1fr; } .role-label { flex-direction: row; gap: 0.75rem; padding: 0.75rem; justify-content: center; } .role-label svg { margin-bottom: 0; } .name-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div id="page-loader" role="status" aria-label="Loading"><div class="loader-premium-content"><div class="loader-spinner"></div><img src="images/logo-stackly.webp" alt="STACKLY" class="loader-logo" /></div></div>
<div class="auth-wrapper">
  <div class="auth-left">
    <div class="auth-left-content" data-anim="fade-up">
      <a href="index.html" class="auth-left-logo"><img src="images/logo-stackly.webp" alt="STACKLY" /></a>
      <h2 class="auth-left-title">Explore the World. Create Memories.</h2>
      <p class="auth-left-desc">Join thousands of travelers who trust STACKLY for their dream vacations. Sign up today and unlock exclusive deals and personalized experiences.</p>
    </div>
  </div>
  <div class="auth-right">
    <div class="auth-bg-shape auth-bg-shape-1"></div>
    <div class="auth-bg-shape auth-bg-shape-2"></div>
    <div class="auth-card" data-anim="fade-left">
      <div style="margin-bottom:1.5rem;"><button type="button" onclick="history.back()" style="background:none;border:none;color:var(--text-dark-secondary);cursor:pointer;font-weight:600;font-size:0.9rem;display:inline-flex;align-items:center;gap:0.4rem;padding:0;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>Go Back</button></div>
      <a href="index.html" class="mobile-logo"><img src="images/logo-stackly.webp" alt="STACKLY" /></a>
      <h1 class="auth-title">Create an Account</h1>
      <p class="auth-subtitle">Join STACKLY's travel platform.</p>
      <form class="auth-form" id="signupForm">
        <label class="form-label">I am a...</label>
        <div class="role-options">
          <div class="role-option"><input type="radio" name="role" id="role-traveler" value="Traveler" checked><label class="role-label" for="role-traveler"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Traveler</span></label></div>
          <div class="role-option"><input type="radio" name="role" id="role-agent" value="Travel Agent"><label class="role-label" for="role-agent"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg><span>Travel Agent</span></label></div>
        </div>
        <div class="name-grid">
          <div><label class="form-label" for="fname">First Name</label><input type="text" id="fname" class="form-control" placeholder="John" required pattern="[A-Za-z\s]+" oninput="this.value=this.value.replace(/[^A-Za-z\s]/g,'')"></div>
          <div><label class="form-label" for="lname">Last Name</label><input type="text" id="lname" class="form-control" placeholder="Doe" required pattern="[A-Za-z\s]+" oninput="this.value=this.value.replace(/[^A-Za-z\s]/g,'')"></div>
        </div>
        <div class="form-group"><label class="form-label" for="phone">Phone Number</label><input type="tel" id="phone" class="form-control" placeholder="1234567890" required pattern="\d{1,10}" maxlength="10" oninput="this.value=this.value.replace(/[^0-9]/g,'');"></div>
        <div class="form-group"><label class="form-label" for="email">Email Address</label><div class="input-with-icon"><svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-light-muted);"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg><input type="email" id="email" class="form-control" placeholder="you@email.com" required></div></div>
        <div class="form-group"><label class="form-label" for="password">Password</label><div class="input-with-icon"><svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-light-muted);"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg><input type="password" id="password" class="form-control" placeholder="Min. 8 characters" required pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[!@#$%^&*]).{8,}"><button type="button" class="password-toggle" id="togglePassword"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div></div>
        <div class="form-group"><label class="form-label" for="confirmPassword">Confirm Password</label><div class="input-with-icon"><svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-light-muted);"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg><input type="password" id="confirmPassword" class="form-control" placeholder="Confirm your password" required><button type="button" class="password-toggle" id="toggleConfirmPassword"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div></div>
        <div style="margin-top:1rem;margin-bottom:1.5rem;font-size:0.85rem;color:var(--text-dark-secondary);display:flex;gap:0.5rem;align-items:flex-start;">
          <input type="checkbox" id="terms" required style="margin-top:0.2rem;accent-color:var(--primary);">
          <label for="terms">I agree to the <a href="404.html" style="color:var(--primary);text-decoration:none;">Terms of Service</a> and <a href="404.html" style="color:var(--primary);text-decoration:none;">Privacy Policy</a>.</label>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">Create Account</button>
      </form>
      <p style="margin-top:2rem;font-size:0.9rem;color:var(--text-dark-secondary);">Already have an account? <a href="login.html" style="color:var(--primary);font-weight:700;text-decoration:none;">Log in</a></p>
    </div>
  </div>
</div>
<div id="toast-container" aria-live="polite"></div>
<script src="js/auth.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<script src="js/main.js"></script>
<script>
  if (authIsLoggedIn()) window.location.href = 'dashboard.html';
  document.getElementById('togglePassword').addEventListener('click', function() { const pwd = document.getElementById('password'); const type = pwd.type === 'password' ? 'text' : 'password'; pwd.type = type; this.style.color = type === 'text' ? 'var(--primary)' : 'var(--text-dark-secondary)'; });
  document.getElementById('toggleConfirmPassword').addEventListener('click', function() { const pwd = document.getElementById('confirmPassword'); const type = pwd.type === 'password' ? 'text' : 'password'; pwd.type = type; this.style.color = type === 'text' ? 'var(--primary)' : 'var(--text-dark-secondary)'; });
  document.getElementById('signupForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const fname = document.getElementById('fname').value.trim();
    const lname = document.getElementById('lname').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const role = document.querySelector('input[name="role"]:checked').value;
    if (password !== confirmPassword) { window.showToast('Passwords do not match.', 'error'); return; }
    if (fname && lname && email && password && document.getElementById('terms').checked) {
      authSignup(`${fname} ${lname}`, email, role, password);
      window.showToast('Account created! Please log in.', 'success');
      setTimeout(() => { window.location.href = 'login.html'; }, 1500);
    }
  });
</script>
</body>
</html>
