<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings — STACKLY</title>
  <link rel="stylesheet" href="css/style.css?v=1" />
  <style>
    body { background: var(--bg-light); display: flex; min-height: 100vh; padding-top: 0; font-family: var(--font-body); }
    .dashboard-sidebar { width: 280px; background: #fff; border-right: 1px solid var(--border-light); display: flex; flex-direction: column; position: fixed; top: 0; bottom: 0; left: 0; z-index: 100; transition: transform 0.3s; }
    .sidebar-header { padding: 1.5rem; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; }
    .sidebar-logo img { height: 32px; }
    .sidebar-nav { padding: 1.5rem 1rem; flex: 1; overflow-y: auto; }
    .nav-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dark-secondary); margin: 1.5rem 0 0.75rem 1rem; font-weight: 700; }
    .nav-label:first-child { margin-top: 0; }
    .sidebar-link { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; color: var(--text-dark); text-decoration: none; border-radius: var(--radius-lg); font-weight: 600; font-size: 0.95rem; margin-bottom: 0.25rem; transition: all 0.2s; }
    .sidebar-link svg { color: var(--text-dark-secondary); transition: all 0.2s; }
    .sidebar-link:hover { background: var(--bg-light-alt); }
    .sidebar-link.active { background: rgba(15,118,110,0.08); color: var(--primary); }
    .sidebar-link.active svg { color: var(--primary); }
    .sidebar-footer { padding: 1rem; border-top: 1px solid var(--border-light); }
    .dashboard-main { flex: 1; margin-left: 280px; display: flex; flex-direction: column; min-height: 100vh; }
    .dashboard-header { height: 72px; background: #fff; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; position: sticky; top: 0; z-index: 90; }
    .header-actions { display: flex; align-items: center; gap: 1.5rem; margin-left: auto; }
    .user-profile { display: flex; align-items: center; gap: 0.75rem; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; }
    .dashboard-content { padding: 2rem; flex: 1; max-width: 800px; }
    .page-title { font-family: var(--font-heading); font-size: 1.75rem; font-weight: 800; margin-bottom: 1.5rem; }
    
    .settings-panel { background: #fff; border: 1px solid var(--border-light); border-radius: var(--radius-xl); padding: 2rem; margin-bottom: 2rem; }
    .settings-panel h3 { font-family: var(--font-heading); font-size: 1.25rem; font-weight: 700; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border-light); }
    
    .profile-edit { display: flex; gap: 2rem; align-items: flex-start; margin-bottom: 2rem; }
    .profile-avatar-edit { display: flex; flex-direction: column; align-items: center; gap: 1rem; }
    .avatar-large { width: 100px; height: 100px; border-radius: 50%; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 700; }
    
    .form-grid { display: grid; grid-template-columns: 1fr; gap: 1.5rem; }
    @media (min-width: 768px) { .form-grid { grid-template-columns: 1fr 1fr; } }
    .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
    .form-label { font-size: 0.9rem; font-weight: 600; color: var(--text-dark); }
    .form-control { padding: 0.75rem 1rem; border: 1px solid var(--border-light-strong); border-radius: var(--radius-lg); font-size: 0.95rem; font-family: inherit; outline: none; transition: border-color 0.2s; }
    .form-control:focus { border-color: var(--primary); }
    .form-control[readonly] { background: var(--bg-light-alt); cursor: not-allowed; }

    @media (max-width: 992px) {
      .dashboard-sidebar { transform: translateX(-100%); }
      .dashboard-sidebar.open { transform: translateX(0); }
      .dashboard-main { margin-left: 0; }
      .profile-edit { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>

<aside class="dashboard-sidebar" id="sidebar">
  <div class="sidebar-header"><a href="index.html" class="sidebar-logo"><img src="images/logo-stackly.webp" alt="STACKLY" style="filter:invert(1);" /></a><button class="mobile-menu-btn" id="closeSidebar" style="display:block;@media(min-width:992px){display:none;}"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
  <nav class="sidebar-nav">
    <div class="nav-label">Main</div>
    <a href="dashboard.html" class="sidebar-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg> Dashboard</a>
    <a href="bookings.html" class="sidebar-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg> My Bookings</a>
    <a href="messages.html" class="sidebar-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> Messages</a>
    <div class="nav-label">Settings</div>
    <a href="settings.html" class="sidebar-link active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg> Account</a>
    <a href="#" class="sidebar-link" onclick="authLogout();return false;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Logout</a>
  </nav>
</aside>

<main class="dashboard-main">
  <header class="dashboard-header">
    <div style="display:flex;align-items:center;gap:1rem;"><button class="mobile-menu-btn" id="openSidebar" style="display:block;@media(min-width:992px){display:none;}"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button></div>
    <div class="header-actions">
      <div class="user-profile"><div class="avatar" id="userAvatar">U</div></div>
    </div>
  </header>
  
  <div class="dashboard-content">
    <h1 class="page-title">Account Settings</h1>
    
    <div class="settings-panel">
      <h3>Personal Information</h3>
      <div class="profile-edit">
        <div class="profile-avatar-edit">
          <div class="avatar-large" id="profileAvatar">U</div>
          <button class="btn btn-outline" style="padding:0.4rem 1rem;font-size:0.8rem;">Change Photo</button>
        </div>
        <div style="flex:1;">
          <form id="settingsForm" onsubmit="event.preventDefault(); window.showToast('Settings updated successfully!','success');">
            <div class="form-grid">
              <div class="form-group"><label class="form-label">Full Name</label><input type="text" id="settingName" class="form-control" /></div>
              <div class="form-group"><label class="form-label">Email Address (Read-only)</label><input type="email" id="settingEmail" class="form-control" readonly /></div>
              <div class="form-group"><label class="form-label">Phone Number</label><input type="tel" class="form-control" placeholder="+1 (555) 000-0000" /></div>
              <div class="form-group"><label class="form-label">Account Role</label><input type="text" id="settingRole" class="form-control" readonly /></div>
            </div>
            <div style="margin-top:2rem;text-align:right;">
              <button type="submit" class="btn btn-primary">Save Changes</button>
            </div>
          </form>
        </div>
      </div>
    </div>
    
    <div class="settings-panel">
      <h3>Security</h3>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Current Password</label><input type="password" class="form-control" placeholder="••••••••" /></div>
        <div class="form-group"><label class="form-label">New Password</label><input type="password" class="form-control" placeholder="••••••••" /></div>
      </div>
      <div style="margin-top:1.5rem;"><button class="btn btn-outline">Update Password</button></div>
    </div>
  </div>
</main>

<div id="toast-container" aria-live="polite"></div>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>
<script>
  if (!authIsLoggedIn()) window.location.href = 'login.html';
  const user = authGetUser();
  if(user) {
    document.getElementById('userAvatar').textContent = user.name.charAt(0).toUpperCase();
    document.getElementById('profileAvatar').textContent = user.name.charAt(0).toUpperCase();
    document.getElementById('settingName').value = user.name;
    document.getElementById('settingEmail').value = user.email;
    document.getElementById('settingRole').value = user.role;
  }
  document.getElementById('openSidebar')?.addEventListener('click', () => document.getElementById('sidebar').classList.add('open'));
  document.getElementById('closeSidebar')?.addEventListener('click', () => document.getElementById('sidebar').classList.remove('open'));
</script>
</body>
</html>
